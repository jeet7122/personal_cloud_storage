spring:
  kafka:
    bootstrap-servers: kafka:9092
    listener:
      concurrency: 3
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: photo-upload-workers
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.jeet.photo_store
        spring.json.value.default.type: com.jeet.photo_store.dtos.events.PhotoUploadEvent
  application:
    name: photo-store-worker
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

# PORT

server:
  port: 8081


#R2 Config
cloudflare:
  r2:
    access-key: ${R2_ACCESS_KEY}
    secret-key: ${R2_SECRET_KEY}
    endpoint: ${R2_ENDPOINT}
    bucket: ${R2_BUCKET}

# Logging

logging:
  level:
    com.jeet.photo_store: DEBUG
    org.springframework.kafka: INFO
